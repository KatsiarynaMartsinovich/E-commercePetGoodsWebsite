<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="cut">
      <!-- Белое = видно -->
      <rect width="64" height="64" fill="white"/>
      
      <!-- Чёрное = вырезается (стрелка "больше") -->
      <!-- Увеличенный размер и смещение правее: было 26,18 → 28,14, ширина 16 → 20 -->
      <polygon points="28,14 48,32 28,50 22,45 38,32 22,19" fill="black"/>
    </mask>
  </defs>

  <!-- Круг -->
  <circle cx="32" cy="32" r="30" fill="#e6e6e6" mask="url(#cut)"/>
</svg>